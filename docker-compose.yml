

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: num_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./src:/app/src
    environment:
      - DB_HOST=db
      - DB_NAME=num_db
      - DB_PASS=root_password

volumes:
  db_data: