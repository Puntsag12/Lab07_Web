<!doctype html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>NUM Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container">
        <h2>Удирдах хэсэг (CRUD)</h2>
        <div class="card p-4 mb-4 shadow-sm">
            <h4 id="formTitle">Мэдээлэл нэмэх</h4>
            <input type="hidden" id="editId">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="statLabel" class="form-control" placeholder="Тайлбар">
                </div>
                <div class="col-md-4">
                    <input type="number" id="statValue" class="form-control" placeholder="Утга">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="saveBtn" onclick="saveData()">Хадгалах</button>
                </div>
            </div>
        </div>

        <table class="table table-white shadow-sm">
            <thead class="table-dark">
                <tr><th>Тайлбар</th><th>Утга</th><th>Үйлдэл</th></tr>
            </thead>
            <tbody id="admin-list"></tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = data.map(item => `
                <tr>
                    <td>${item.category}</td>
                    <td>${item.value}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editMode(${item.id}, '${item.category}', ${item.value})">Засах</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteData(${item.id})">Устгах</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveData() {
            const id = document.getElementById('editId').value;
            const label = document.getElementById('statLabel').value;
            const value = document.getElementById('statValue').value;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/stats/${id}` : '/api/stats';

            await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ label, value })
            });
            
            clearForm();
            loadData();
        }

        function editMode(id, label, value) {
            document.getElementById('editId').value = id;
            document.getElementById('statLabel').value = label;
            document.getElementById('statValue').value = value;
            document.getElementById('formTitle').innerText = "Мэдээлэл засах";
        }

        function clearForm() {
            document.getElementById('editId').value = '';
            document.getElementById('statLabel').value = '';
            document.getElementById('statValue').value = '';
            document.getElementById('formTitle').innerText = "Мэдээлэл нэмэх";
        }

        async function deleteData(id) {
            if(confirm('Устгах уу?')) {
                await fetch(`/api/stats/${id}`, { method: 'DELETE' });
                loadData();
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
