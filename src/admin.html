<!doctype html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>NUM Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .num-blue { color: #113b7e; }
        .edit-mode { background-color: #fff3cd !important; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="num-blue">Удирдах хэсэг</h2>
        <hr>
        
        <div class="card p-4 mb-4 shadow-sm" id="inputCard">
            <h4 id="formTitle">Шинэ мэдээлэл нэмэх</h4>
            <input type="hidden" id="editId"> <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="statLabel" class="form-control" placeholder="Тайлбар">
                </div>
                <div class="col-md-4">
                    <input type="number" id="statValue" class="form-control" placeholder="Утга">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-primary w-100" id="submitBtn" onclick="saveData()">Нэмэх</button>
                    <button class="btn btn-secondary d-none" id="cancelBtn" onclick="cancelEdit()">Болих</button>
                </div>
            </div>
        </div>

        <table class="table table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Тайлбар</th>
                    <th>Утга</th>
                    <th>Үйлдэл</th>
                </tr>
            </thead>
            <tbody id="admin-list"></tbody>
        </table>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/stats';

        // 1. Ugugdul tataj haruulna
        async function loadAdminData() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = data.map(item => `
                <tr id="row-${item.id}">
                    <td>${item.category}</td>
                    <td>${item.value.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-2" onclick="editData(${item.id}, '${item.category}', ${item.value})">Засах</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteData(${item.id})">Устгах</button>
                    </td>
                </tr>
            `).join('');
        }

        // 2. Nemeh, hadgalah
        async function saveData() {
            const label = document.getElementById('statLabel').value;
            const value = document.getElementById('statValue').value;
            const editId = document.getElementById('editId').value;

            if (!label || !value) return alert("Утга оруулна уу!");

            const method = editId ? 'PUT' : 'POST';
            const url = editId ? `${API_URL}/${editId}` : API_URL;

            const res = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ label, value })
            });

            if (res.ok) {
                cancelEdit();
                loadAdminData();
            } else {
                alert("Алдаа гарлаа!");
            }
        }

        // 3. Zasah hesegrvv shiljih
        function editData(id, label, value) {
            document.getElementById('editId').value = id;
            document.getElementById('statLabel').value = label;
            document.getElementById('statValue').value = value;
            
            document.getElementById('formTitle').innerText = "Мэдээлэл засах";
            document.getElementById('submitBtn').innerText = "Хадгалах";
            document.getElementById('submitBtn').className = "btn btn-success w-100";
            document.getElementById('cancelBtn').classList.remove('d-none');
            document.getElementById('inputCard').classList.add('edit-mode');
        }

        // 4. Zaswariig tsutslah
        function cancelEdit() {
            document.getElementById('editId').value = '';
            document.getElementById('statLabel').value = '';
            document.getElementById('statValue').value = '';
            
            document.getElementById('formTitle').innerText = "Шинэ мэдээлэл нэмэх";
            document.getElementById('submitBtn').innerText = "Нэмэх";
            document.getElementById('submitBtn').className = "btn btn-primary w-100";
            document.getElementById('cancelBtn').classList.add('d-none');
            document.getElementById('inputCard').classList.remove('edit-mode');
        }

        // 5. Ustgah
        async function deleteData(id) {
            if (confirm('Энэ өгөгдлийг устгахдаа итгэлтэй байна уу?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadAdminData();
            }
        }

        window.onload = loadAdminData;
    </script>
</body>
</html>
